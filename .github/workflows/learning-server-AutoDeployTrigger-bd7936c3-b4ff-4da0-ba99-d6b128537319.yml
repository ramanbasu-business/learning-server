name: Trigger auto deployment for learning-server

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/learning-server-AutoDeployTrigger-bd7936c3-b4ff-4da0-ba99-d6b128537319.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LEARNINGSERVER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LEARNINGSERVER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LEARNINGSERVER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: index.docker.io/v1
          registryUsername: ${{ secrets.LEARNINGSERVER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LEARNINGSERVER_REGISTRY_PASSWORD }}
          containerAppName: learning-server
          resourceGroup: learning-RS
          imageToBuild: index.docker.io/v1/learning-server:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


